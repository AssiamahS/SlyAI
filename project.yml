name: SlyAI
options:
  bundleIdPrefix: com.blkstr
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.2"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

packages:
  SwiftNIOSSH:
    url: https://github.com/apple/swift-nio-ssh.git
    from: "0.9.0"
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.2.0"

targets:
  SlyAI:
    type: application
    platform: iOS
    sources: [SlyAI]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blkstr.slyai
        INFOPLIST_FILE: SlyAI/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QGMAWHX827
    dependencies:
      - package: SwiftNIOSSH
        product: NIOSSH
      - package: SwiftTerm
      - sdk: EventKit.framework
      - sdk: UserNotifications.framework
      - sdk: CoreSpotlight.framework
      - sdk: WidgetKit.framework
      - sdk: Speech.framework
      - sdk: AVFoundation.framework
      - target: SlyAIWidgets
    info:
      path: SlyAI/Info.plist
      properties:
        CFBundleDisplayName: SlyAI
        CFBundleName: SlyAI
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSMicrophoneUsageDescription: SlyAI uses the microphone for voice commands
        NSSpeechRecognitionUsageDescription: SlyAI uses speech recognition to understand your voice commands

  SlyAIWidgets:
    type: app-extension
    platform: iOS
    entitlements:
      path: SlyAIWidgets/SlyAIWidgets.entitlements
    sources: [SlyAIWidgets]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blkstr.slyai.widgets
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QGMAWHX827
        SWIFT_VERSION: "6.0"
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    info:
      path: SlyAIWidgets/Info.plist
      properties:
        CFBundleDisplayName: SlyAI Widgets
        CFBundlePackageType: XPC!
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
